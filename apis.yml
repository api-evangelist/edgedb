apis:
- aid: edgedb:edgeql-http-api
  name: EdgeDB EdgeQL HTTP API
  description: Executes EdgeQL queries over HTTP against a Gel/EdgeDB instance. Supports
    GET and POST requests with query, variables, globals, and config fields. Authentication
    uses HTTP Basic (password), Bearer token (secret key for Cloud), or JWT. DDL and
    transaction commands are not supported; only one query per request is allowed.
  humanURL: https://docs.geldata.com/reference/using/http
  baseURL: https://<hostname>:<port>/branch/<branch-name>/edgeql
  tags:
  - Database
  - EdgeQL
  - HTTP API
  - Query
  properties:
  - type: Documentation
    url: https://docs.geldata.com/reference/using/http
- aid: edgedb:graphql-api
  name: EdgeDB GraphQL API
  description: Provides a GraphQL endpoint for querying an EdgeDB/Gel instance, supporting
    queries, mutations, and introspection. Enabled via the graphql extension in the
    schema. Authentication uses the same secret key bearer token mechanism as the
    HTTP EdgeQL API.
  humanURL: https://docs.geldata.com/cloud/http_gql
  baseURL: https://<hostname>:<port>/branch/<branch-name>/graphql
  tags:
  - Database
  - GraphQL
  - API
  - Query
  properties:
  - type: Documentation
    url: https://docs.geldata.com/cloud/http_gql
  - url: graphql/edgedb-graphql.md
    type: GraphQL
- aid: edgedb:cloud-management
  name: EdgeDB Cloud Management
  description: Managed cloud database service for provisioning and operating EdgeDB/Gel
    instances. Accessible via the Gel CLI, web dashboard at cloud.geldata.com, and
    platform integrations. Supports secret key creation, instance management, and
    environment variable configuration.
  humanURL: https://docs.geldata.com/cloud
  baseURL: https://cloud.geldata.com
  tags:
  - Cloud
  - Database Management
  - DevOps
  properties:
  - type: Documentation
    url: https://docs.geldata.com/cloud
