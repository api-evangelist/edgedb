aid: edgedb
name: EdgeDB
description: EdgeDB (rebranded as Gel in 2025) is an open-source object-relational
  database built on top of PostgreSQL that combines a modern graph-relational data
  model with a powerful query language called EdgeQL. It provides an HTTP-based EdgeQL
  query API and a GraphQL API, allowing developers to query their database over standard
  HTTP using bearer token authentication. EdgeDB Cloud offers a fully managed hosting
  service with free and paid tiers, integrating with platforms such as Vercel, Netlify,
  Fly.io, and Railway. Client libraries are available for TypeScript, Python, Go,
  Dart, Rust, .NET, and Java.
