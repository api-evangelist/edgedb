description: >-
  Gel (formerly EdgeDB) Cloud offers three pricing tiers: a Free tier for
  development, a Pro tier starting at $19.50/month with scalable compute and
  storage, and an Enterprise tier with custom pricing for dedicated clusters
  and advanced SLAs. All tiers include unlimited reads and writes. Prices
  reflect the aws-us-east-2 region in USD.
sources:
  - https://www.geldata.com/pricing
plans:
  - id: edgedb-free
    name: Free
    type: free
    description: >-
      Free tier intended for development and prototyping. Includes 1/4 compute
      unit (1/2 GiB RAM, 1/16 vCPU) and up to 1 GB of disk space. Data is
      encrypted at rest and community support is provided.
    entries:
